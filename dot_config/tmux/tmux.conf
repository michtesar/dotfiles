# ~/.config/tmux/tmux.conf
#
# This config is intentionally small and sectioned by purpose:
# - Ctrl-a is the tmux prefix instead of the default Ctrl-b.
# - Panes and windows open in the current working directory.
# - Catppuccin follows the macOS appearance when tmux starts or when this file is reloaded.
# - Plugins are managed by TPM. After adding a plugin, press Ctrl-a then I inside tmux.


##### Prefix / Core Keybinds ###################################################

# Replace the default Ctrl-b prefix with Ctrl-a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload this config. This also re-runs the macOS theme detection below.
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'


##### Copy Mode ################################################################

# Use vi-style keys in copy mode.
setw -g mode-keys vi

# Start/select text with v, copy with y. tmux-yank handles system clipboard copy.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


##### Panes ####################################################################

# Split panes in the current pane's directory.
unbind h
unbind x
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Move between panes with prefix + uppercase vim directions.
bind H select-pane -L
bind J select-pane -D
bind K select-pane -U
bind L select-pane -R

# Resize panes in repeat mode, so the key can be held/repeated after prefix.
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r _ resize-pane -D 5
bind -r + resize-pane -U 5


##### Windows / Sessions #######################################################

# New windows open in the current pane's directory.
bind c new-window -c "#{pane_current_path}"

bind k kill-window
bind R command-prompt -I "#W" "rename-window '%%'"

# Built-in tree picker for sessions/windows/panes.
bind s choose-tree -Zw

# Keep window tabs useful: use the current directory name instead of shell/host
# pane titles such as "Michael--MacBook-Pro.local".
setw -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"


##### Terminal / Behavior ######################################################

set -g default-terminal tmux-256color

# Truecolor support. terminal-features is the modern tmux setting; terminal-overrides
# is kept because it remains harmless and helps older/quirky terminal entries.
set -ag terminal-overrides ",*:RGB"
set -as terminal-features ",*:RGB"

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 50000
set -g escape-time 0

# Start windows and panes at 1 instead of 0.
set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on
setw -g aggressive-resize on

# If a session is destroyed, switch to another one instead of detaching entirely.
set -g detach-on-destroy off


##### Theme ####################################################################

# Match Ghostty's Catppuccin setup:
#   light: Catppuccin Latte
#   dark:  Catppuccin Mocha
#
# tmux cannot automatically receive macOS appearance-change events. This detects
# the current macOS appearance when tmux starts or when you reload with Ctrl-a r.
if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  'set -g @catppuccin_flavor mocha' \
  'set -g @catppuccin_flavor latte'

# Keep local Catppuccin overrides stable across config reloads.
set -g @catppuccin_window_status_style rounded
set -g @catppuccin_window_flags none
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -gu @catppuccin_window_current_left_separator
set -gu @catppuccin_window_current_middle_separator
set -gu @catppuccin_window_current_right_separator

# Manually toggle Catppuccin flavor without re-running the macOS appearance detection.
bind T if -F '#{==:#{@catppuccin_flavor},mocha}' \
  'set -g @catppuccin_flavor latte \; run-shell "$HOME/.config/tmux/plugins/tmux/catppuccin.tmux" \; display-message "Catppuccin Latte"' \
  'set -g @catppuccin_flavor mocha \; run-shell "$HOME/.config/tmux/plugins/tmux/catppuccin.tmux" \; display-message "Catppuccin Mocha"'


##### Plugins ##################################################################

# TPM plugin manager. Keep this first in the plugin list.
set -g @plugin 'tmux-plugins/tpm'

# Sensible tmux defaults, clipboard integration, and Neovim/tmux navigation.
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin theme. The flavor is selected dynamically in the Theme section above.
set -g @plugin 'catppuccin/tmux'

# Load Catppuccin before assigning status modules, then let TPM load plugins.
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
# Left edge is intentionally reserved for the tmux mode signal: the terminal
# icon turns red while the prefix table is active, green otherwise.
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# TPM must stay at the bottom so it can load everything declared above.
run '~/.config/tmux/plugins/tpm/tpm'
