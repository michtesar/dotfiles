# tmux
# Prefix: Ctrl-a
# Plugins: Ctrl-a then I


##### Prefix ###################################################################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'


##### Copy Mode ################################################################

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


##### Panes ####################################################################

unbind h
unbind x
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

bind H select-pane -L
bind J select-pane -D
bind K select-pane -U
bind L select-pane -R

bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r _ resize-pane -D 5
bind -r + resize-pane -U 5


##### Windows / Sessions #######################################################

bind c new-window -c "#{pane_current_path}"

bind k kill-window
bind R command-prompt -I "#W" "rename-window '%%'"

bind s choose-tree -Zw

# Window name = current directory. Hostnames are noise.
setw -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"


##### Terminal / Behavior ######################################################

set -g default-terminal tmux-256color

# Truecolor. Both lines stay because terminals lie.
set -ag terminal-overrides ",*:RGB"
set -as terminal-features ",*:RGB"

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 50000
set -g escape-time 0

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on
setw -g aggressive-resize on

# Killing a session should not boot me out of tmux.
set -g detach-on-destroy off


##### Theme ####################################################################

# Match macOS on start/reload. Manual toggle is Ctrl-a T.
if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  'set -g @catppuccin_flavor mocha' \
  'set -g @catppuccin_flavor latte'

set -g @catppuccin_window_status_style rounded
set -g @catppuccin_window_flags none
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -gu @catppuccin_window_current_left_separator
set -gu @catppuccin_window_current_middle_separator
set -gu @catppuccin_window_current_right_separator

bind T if -F '#{==:#{@catppuccin_flavor},mocha}' \
  'set -g @catppuccin_flavor latte \; run-shell "$HOME/.config/tmux/plugins/tmux/catppuccin.tmux" \; display-message "Catppuccin Latte"' \
  'set -g @catppuccin_flavor mocha \; run-shell "$HOME/.config/tmux/plugins/tmux/catppuccin.tmux" \; display-message "Catppuccin Mocha"'


##### Plugins ##################################################################

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Keep Ctrl-l for shell clear.
set -g @vim_navigator_mapping_right 'C-Right'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'catppuccin/tmux'

run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

run '~/.config/tmux/plugins/tpm/tpm'

bind-key -n C-l send-keys C-l
